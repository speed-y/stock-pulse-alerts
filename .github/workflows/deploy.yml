name: Deploy to Apps Script

on:
  push:
    branches: [main]
    paths:
      - Code.gs
      - appsscript.json
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install clasp
        run: npm install -g @google/clasp@3.3.0

      - name: Write clasp credentials
        run: echo '${{ secrets.CLASPRC }}' > ~/.clasprc.json

      - name: Write .clasp.json with script ID
        run: |
          echo '{"scriptId":"${{ secrets.CLASP_SCRIPT_ID }}","rootDir":"."}' > .clasp.json

      - name: Push to Apps Script
        run: clasp push --force
